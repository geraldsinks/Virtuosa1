<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0A1128" />
  <title>Virtuosa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0A1128;
      --surface: #111d3e;
      --gold: #D4A853;
      --gold-light: #f0c96e;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      /* Prevent iOS rubber-band bounce */
      overscroll-behavior: none;
    }

    .logo-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      position: relative;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(212, 168, 83, 0.25);
      animation: pulse 2.5s ease-in-out infinite 0.4s;
    }

    .logo-v {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -2px;
      font-style: italic;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.75; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid rgba(212, 168, 83, 0.2);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      max-width: 320px;
      width: 100%;
      margin-bottom: 2rem;
    }

    .wifi-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .status-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .status-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .retry-btn {
      background: linear-gradient(135deg, var(--gold), #b8892e);
      color: #0A1128;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 50px;
      padding: 0.9rem 2.5rem;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-appearance: none;
    }

    .retry-btn:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 2rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* Loading state (shown on first launch before redirect) */
    .connecting { display: block; }
    .offline { display: none; }

    body.is-offline .connecting { display: none; }
    body.is-offline .offline { display: block; }
  </style>
</head>
<body>
  <div class="logo-ring">
    <span class="logo-v">V</span>
  </div>

  <h1>Virtuosa</h1>
  <p class="tagline">Zambia's premier campus marketplace</p>

  <!-- Connecting state (default, shown on launch) -->
  <div class="connecting">
    <p style="color: var(--text-muted); font-size:0.85rem; margin-bottom:1rem;">Connecting to Virtuosa...</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Offline state -->
  <div class="offline">
    <div class="status-card">
      <div class="wifi-icon">📶</div>
      <div class="status-title">You're Offline</div>
      <div class="status-desc">
        Check your internet connection and try again. Your cart and saved items will still be here.
      </div>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>

  <script>
    // Detect offline and show appropriate state
    function checkConnection() {
      if (!navigator.onLine) {
        document.body.classList.add('is-offline');
      } else {
        document.body.classList.remove('is-offline');
        // Attempt to reload to get the live site
        setTimeout(() => window.location.reload(), 500);
      }
    }

    window.addEventListener('offline', () => document.body.classList.add('is-offline'));
    window.addEventListener('online', checkConnection);

    // On initial load, if online, this page only briefly shows before 
    // Capacitor redirects to server.url — that's expected behaviour
    if (!navigator.onLine) {
      document.body.classList.add('is-offline');
    }
  </script>
</body>
</html>
