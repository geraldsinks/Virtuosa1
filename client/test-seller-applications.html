<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Seller Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Debug Seller Applications API</h1>
        
        <div class="bg-white rounded-lg p-6 mb-4">
            <h2 class="text-lg font-semibold mb-4">Test API Connection</h2>
            <button onclick="testAPI()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Test API Connection
            </button>
            <div id="api-result" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <div class="bg-white rounded-lg p-6 mb-4">
            <h2 class="text-lg font-semibold mb-4">Test Authentication</h2>
            <button onclick="testAuth()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                Test Admin Authentication
            </button>
            <div id="auth-result" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <div class="bg-white rounded-lg p-6">
            <h2 class="text-lg font-semibold mb-4">Test Applications Endpoint</h2>
            <button onclick="testApplications()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                Test Applications Endpoint
            </button>
            <div id="apps-result" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.innerHTML = '<p class="text-blue-600">Testing API connection...</p>';
            
            try {
                const response = await fetch('https://api.virtuosazm.com/health');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="text-green-600">
                        <p>✅ API is reachable!</p>
                        <pre class="mt-2 text-xs">${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <p>❌ API connection failed!</p>
                        <p class="text-sm mt-2">Error: ${error.message}</p>
                        <p class="text-sm mt-2">Make sure the server is running on api.virtuosazm.com</p>
                    </div>
                `;
            }
        }

        async function testAuth() {
            const resultDiv = document.getElementById('auth-result');
            resultDiv.innerHTML = '<p class="text-blue-600">Testing authentication...</p>';
            
            // Try to get token from localStorage
            const token = localStorage.getItem('token');
            if (!token) {
                resultDiv.innerHTML = `
                    <div class="text-yellow-600">
                        <p>⚠️ No admin token found in localStorage</p>
                        <p class="text-sm mt-2">Please log in as admin first</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch('https://api.virtuosazm.com/api/admin/dashboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="text-green-600">
                            <p>✅ Admin authentication working!</p>
                            <p class="text-sm mt-2">Token is valid</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="text-red-600">
                            <p>❌ Admin authentication failed!</p>
                            <p class="text-sm mt-2">Status: ${response.status}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <p>❌ Authentication test failed!</p>
                        <p class="text-sm mt-2">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testApplications() {
            const resultDiv = document.getElementById('apps-result');
            resultDiv.innerHTML = '<p class="text-blue-600">Testing applications endpoint...</p>';
            
            const token = localStorage.getItem('token');
            if (!token) {
                resultDiv.innerHTML = `
                    <div class="text-yellow-600">
                        <p>⚠️ No admin token found in localStorage</p>
                        <p class="text-sm mt-2">Please log in as admin first</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch('https://api.virtuosazm.com/api/admin/seller-applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="text-green-600">
                            <p>✅ Applications endpoint working!</p>
                            <p class="text-sm mt-2">Found ${data.applications?.length || 0} applications</p>
                            <pre class="mt-2 text-xs">${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="text-red-600">
                            <p>❌ Applications endpoint failed!</p>
                            <p class="text-sm mt-2">Status: ${response.status}</p>
                            <p class="text-sm mt-2">Error: ${data.message || 'Unknown error'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <p>❌ Applications test failed!</p>
                        <p class="text-sm mt-2">Error: ${error.message}</p>
                        <p class="text-sm mt-2">Check console for more details</p>
                    </div>
                `;
                console.error('Applications API error:', error);
            }
        }
    </script>

    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>
</html>
