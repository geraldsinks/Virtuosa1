<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary Optimization Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; word-break: break-all; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>

    <!-- Clean URL System -->
    <script src="/js/navigation-state-manager.js"></script>
    <script src="/js/unified-header-fixed.js" defer></script>
    <script src="/js/url-helper.js" defer></script>
</head>
<body>
    <h1>Cloudinary URL Optimization Test</h1>
    
    <div class="test-section">
        <h2>Test Cloudinary URL Transformations</h2>
        <button onclick="testCloudinaryOptimizations()">Run Tests</button>
        <div id="test-results"></div>
    </div>

    <script>
        // Copy the optimized functions from index.html
        function generateOptimizedCloudinaryUrl(imageUrl, width, height) {
            if (!imageUrl || !imageUrl.includes('res.cloudinary.com')) {
                return imageUrl;
            }
            
            const cloudinaryBase = imageUrl.split('/upload/')[0] + '/upload/';
            const imageParts = imageUrl.split('/upload/')[1];
            
            // Remove any existing transformations and add new ones
            const cleanImageParts = imageParts.includes('/') ? imageParts.substring(imageParts.indexOf('/') + 1) : imageParts;
            
            return cloudinaryBase + `q_auto,f_auto,w_${width},h_${height},c_fill/` + cleanImageParts;
        }

        function generateWebpUrl(imageUrl) {
            if (!imageUrl) return imageUrl;
            
            let webpUrl;
            if (imageUrl.includes('placehold.co')) {
                webpUrl = imageUrl.replace(/placehold\.co/, 'placehold.co/webp');
            } else if (imageUrl.includes('api.virtuosazm.com')) {
                webpUrl = imageUrl.includes('?') ? `${imageUrl}&format=webp` : `${imageUrl}?format=webp`;
            } else if (imageUrl.includes('res.cloudinary.com')) {
                // Cloudinary optimization: add q_auto, f_auto, and proper sizing
                const cloudinaryBase = imageUrl.split('/upload/')[0] + '/upload/';
                const imageParts = imageUrl.split('/upload/')[1];
                
                // Check if transformations already exist
                if (imageParts.includes('/')) {
                    // Image already has transformations, add ours
                    const transformationIndex = imageParts.indexOf('/');
                    const existingTransforms = imageParts.substring(0, transformationIndex);
                    const imagePath = imageParts.substring(transformationIndex);
                    
                    // Add our optimizations to existing transformations
                    webpUrl = cloudinaryBase + existingTransforms + ',q_auto,f_auto,w_768,h_280,c_fill' + imagePath;
                } else {
                    // No existing transformations, add ours
                    webpUrl = cloudinaryBase + 'q_auto,f_auto,w_768,h_280,c_fill/' + imageParts;
                }
            } else {
                webpUrl = imageUrl; // For other external URLs, don't modify
            }
            
            return webpUrl;
        }

        function testCloudinaryOptimizations() {
            const results = document.getElementById('test-results');
            results.innerHTML = '';
            
            const testUrls = [
                'https://res.cloudinary.com/dfruk8ufj/image/upload/v1773836660/virtuosa/mar-featured-collection.jpg',
                'https://res.cloudinary.com/dfruk8ufj/image/upload/w_800,h_400,c_fill/v1773836660/virtuosa/mar-featured-collection.jpg',
                'https://api.virtuosazm.com/images/category.jpg',
                'https://placehold.co/400x200?text=Test'
            ];
            
            testUrls.forEach((url, index) => {
                const testDiv = document.createElement('div');
                testDiv.className = 'result';
                
                try {
                    const optimized = generateOptimizedCloudinaryUrl(url, 768, 280);
                    const webp = generateWebpUrl(url);
                    
                    testDiv.innerHTML = `
                        <h3>Test ${index + 1}</h3>
                        <p><strong>Original:</strong> ${url}</p>
                        <p><strong>Optimized:</strong> ${optimized}</p>
                        <p><strong>WebP:</strong> ${webp}</p>
                        <p class="${url.includes('res.cloudinary.com') && optimized.includes('q_auto,f_auto') ? 'success' : 'error'}">
                            ${url.includes('res.cloudinary.com') && optimized.includes('q_auto,f_auto') ? '✅ Cloudinary optimization applied' : '❌ No optimization applied'}
                        </p>
                    `;
                } catch (error) {
                    testDiv.innerHTML = `
                        <h3>Test ${index + 1}</h3>
                        <p><strong>Original:</strong> ${url}</p>
                        <p class="error"><strong>Error:</strong> ${error.message}</p>
                    `;
                }
                
                results.appendChild(testDiv);
            });
        }
    </script>

    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>
</html>
