<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Seller Applications API</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Test Seller Applications API</h1>
        
        <!-- Login Section -->
        <div class="bg-white rounded-lg p-6 mb-4">
            <h2 class="text-lg font-semibold mb-4">Admin Login Test</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Email:</label>
                <input type="email" id="test-email" value="admin@virtuosa.com" 
                    class="border border-gray-300 rounded px-3 py-2 w-full">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Password:</label>
                <input type="password" id="test-password" value="admin123" 
                    class="border border-gray-300 rounded px-3 py-2 w-full">
            </div>
            <button onclick="testLogin()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Login & Get Token
            </button>
            <div id="login-result" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>

        <!-- API Test Section -->
        <div class="bg-white rounded-lg p-6 mb-4">
            <h2 class="text-lg font-semibold mb-4">Test Applications API</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Status Filter:</label>
                <select id="test-status" class="border border-gray-300 rounded px-3 py-2 w-full">
                    <option value="">All Statuses</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
            <button onclick="testApplicationsAPI()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                Test Applications API
            </button>
            <div id="api-result" class="mt-4 p-4 bg-gray-100 rounded max-h-96 overflow-y-auto"></div>
        </div>

        <!-- Debug Info -->
        <div class="bg-white rounded-lg p-6">
            <h2 class="text-lg font-semibold mb-4">Debug Information</h2>
            <div id="debug-info" class="text-sm text-gray-600"></div>
        </div>
    </div>

    <script>
        let authToken = null;

        function updateDebugInfo(message) {
            const debugDiv = document.getElementById('debug-info');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div class="mb-2">[${timestamp}] ${message}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        async function testLogin() {
            const email = document.getElementById('test-email').value;
            const password = document.getElementById('test-password').value;
            const resultDiv = document.getElementById('login-result');
            
            updateDebugInfo(`Attempting login with email: ${email}`);
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    
                    resultDiv.innerHTML = `
                        <div class="text-green-600">
                            <p>✅ Login successful!</p>
                            <p class="text-sm mt-2">Token: ${authToken.substring(0, 20)}...</p>
                            <p class="text-sm">User: ${data.user?.fullName || 'Unknown'}</p>
                            <p class="text-sm">Admin: ${data.user?.isAdmin ? 'Yes' : 'No'}</p>
                        </div>
                    `;
                    
                    updateDebugInfo('Login successful, token stored');
                } else {
                    resultDiv.innerHTML = `
                        <div class="text-red-600">
                            <p>❌ Login failed!</p>
                            <p class="text-sm mt-2">Error: ${data.message}</p>
                        </div>
                    `;
                    
                    updateDebugInfo(`Login failed: ${data.message}`);
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <p>❌ Network error!</p>
                        <p class="text-sm mt-2">Error: ${error.message}</p>
                    </div>
                `;
                
                updateDebugInfo(`Network error: ${error.message}`);
            }
        }

        async function testApplicationsAPI() {
            const resultDiv = document.getElementById('api-result');
            const status = document.getElementById('test-status').value;
            
            if (!authToken) {
                resultDiv.innerHTML = `
                    <div class="text-yellow-600">
                        <p>⚠️ Please login first!</p>
                    </div>
                `;
                return;
            }
            
            updateDebugInfo('Testing applications API...');
            resultDiv.innerHTML = '<p class="text-blue-600">Loading...</p>';
            
            try {
                const params = new URLSearchParams({ page: 1, limit: 20 });
                if (status) params.append('status', status);
                
                const apiUrl = `http://localhost:5000/api/admin/seller-applications?${params}`;
                updateDebugInfo(`API URL: ${apiUrl}`);
                
                const response = await fetch(apiUrl, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                updateDebugInfo(`Response status: ${response.status}`);
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="text-green-600">
                            <p>✅ API call successful!</p>
                            <p class="text-sm mt-2">Applications found: ${data.applications?.length || 0}</p>
                            <p class="text-sm mt-2">Total count: ${data.pagination?.total || 0}</p>
                            <details class="mt-4">
                                <summary class="cursor-pointer font-semibold">View Response Data</summary>
                                <pre class="text-xs mt-2 bg-white p-2 rounded overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                    
                    updateDebugInfo(`Success: ${data.applications?.length} applications loaded`);
                } else {
                    resultDiv.innerHTML = `
                        <div class="text-red-600">
                            <p>❌ API call failed!</p>
                            <p class="text-sm mt-2">Status: ${response.status}</p>
                            <p class="text-sm mt-2">Error: ${data.message}</p>
                            <details class="mt-4">
                                <summary class="cursor-pointer font-semibold">View Error Details</summary>
                                <pre class="text-xs mt-2 bg-white p-2 rounded overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                    
                    updateDebugInfo(`API failed: ${data.message}`);
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-600">
                        <p>❌ Network error!</p>
                        <p class="text-sm mt-2">Error: ${error.message}</p>
                    </div>
                `;
                
                updateDebugInfo(`Network error: ${error.message}`);
            }
        }

        // Check if token exists on load
        window.addEventListener('DOMContentLoaded', () => {
            const storedToken = localStorage.getItem('token');
            if (storedToken) {
                authToken = storedToken;
                updateDebugInfo('Token found in localStorage');
                document.getElementById('login-result').innerHTML = `
                    <div class="text-green-600">
                        <p>✅ Token already stored</p>
                        <p class="text-sm">Token: ${storedToken.substring(0, 20)}...</p>
                    </div>
                `;
            } else {
                updateDebugInfo('No token found in localStorage');
            }
        });
    </script>
</body>
</html>
