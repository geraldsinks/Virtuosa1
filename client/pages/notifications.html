<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuosa - Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-button-gold {
            background-color: #C19A6B;
        }

        .hover-bg-button-gold:hover {
            background-color: #A98B68;
        }

        .bg-dark-navy {
            background-color: #060A18;
        }

        .hidden {
            display: none !important;
        }

        .notification-unread {
            background-color: #EFF6FF;
            border-left: 4px solid #3B82F6;
        }

        .notification-read {
            background-color: #FFFFFF;
            border-left: 4px solid transparent;
        }
    </style>
</head>

<body class="bg-gray-100 antialiased flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-navy text-white shadow-lg py-3 px-6 md:px-12 sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center">
                <a href="/index.html" class="text-3xl font-bold text-gold">Virtuosa</a>
            </div>
            
            <div id="user-info-container" class="flex items-center space-x-4 order-2 md:order-3">
                <a href="/pages/login.html" id="login-link"
                    class="text-white hover:text-gold transition-colors font-medium hidden md:block">Log In</a>

                <div id="user-menu" class="relative hidden">
                    <button onclick="window.toggleUserMenu()"
                        class="text-white hover:text-gold transition-colors font-medium flex items-center space-x-2">
                        <span id="user-greeting" class="hidden md:inline"></span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="user-dropdown"
                        class="absolute right-0 top-8 w-48 bg-navy rounded-lg shadow-xl z-50 py-2 hidden">
                        <a href="/pages/profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">My
                            Profile</a>
                        <a href="/pages/notifications.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">Notifications</a>
                        <a href="/pages/transactions.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">My
                            Transactions</a>
                        <a href="/pages/reviews.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">My
                            Reviews</a>
                        <div id="seller-links" class="hidden">
                            <a href="/pages/seller-dashboard.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-store mr-2"></i>Seller Panel
                            </a>
                            <a href="/pages/create-product.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-plus mr-2"></i>Create Listing
                            </a>
                        </div>
                        <div id="admin-link" class="hidden">
                            <a href="/pages/admin-dashboard.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">Admin
                                Panel</a>
                        </div>
                        <div class="border-t border-gray-700 my-1"></div>
                        <button onclick="window.logout()"
                            class="block w-full text-left px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">Log
                            Out</button>
                    </div>
                </div>

                <a href="/pages/messages.html" class="relative text-white hover:text-gold transition-colors mr-2">
                    <i class="fas fa-envelope text-xl mt-1"></i>
                    <span class="message-badge-count hidden absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>

                <a href="/pages/notifications.html" class="relative text-white hover:text-gold transition-colors mr-2">
                    <i class="fas fa-bell text-xl mt-1"></i>
                    <span id="notification-badge-count"
                        class="hidden absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>

                <a href="/pages/cart.html" class="relative text-white hover:text-gold transition-colors">
                    <i class="fas fa-shopping-cart text-xl mt-1"></i>
                    <span
                        class="absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-900 mb-6">Notifications</h1>

            <div id="notifications-container" class="bg-white shadow rounded-lg overflow-hidden">
                <!-- Notifications list will be populated here -->
                <div class="p-8 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                    <p>Loading notifications...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-navy text-gray-400 p-4 text-center mt-auto">
        &copy; 2025 Virtuosa. All rights reserved.
    </footer>

    <script src="../js/header.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/notifications.js"></script>
</body>

</html>
