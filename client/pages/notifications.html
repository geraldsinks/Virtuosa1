<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuosa - Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CRITICAL: Global Navigation Bootstrap (enables SPA navigation on all pages) -->
    <script src="/js/navigation-bootstrap.js"></script>
    <script src="/js/navigation-coordinator.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-button-gold {
            background-color: #C19A6B;
        }

        .hover-bg-button-gold:hover {
            background-color: #A98B68;
        }

        .bg-dark-navy {
            background-color: #060A18;
        }

        .hidden {
            display: none !important;
        }

        .notification-unread {
            background-color: #EFF6FF;
            border-left: 4px solid #3B82F6;
        }

        .notification-read {
            background-color: #FFFFFF;
            border-left: 4px solid transparent;
        }
    </style>

    <!-- Unified Header System -->
    <script src="/js/config.js"></script>
    <script src="/js/token-manager.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/cache-manager.js" defer></script>
    
    

    <!-- Clean URL System -->
    <script src="/js/navigation-state-manager.js"></script>
    <script src="/js/unified-header-fixed.js" defer></script>
    <script src="/js/url-helper.js" defer></script>
</head>

<body class="bg-gray-100 antialiased flex flex-col min-h-screen">
    <!-- Header -->
    
    <!-- Mobile Header Structure (320px-480px) -->


    <!-- Mobile Navigation Menu Overlay -->
    <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-900 mb-6">Notifications</h1>

            <div id="notifications-container" class="bg-white shadow rounded-lg overflow-hidden">
                <!-- Notifications list will be populated here -->
                <div class="p-8 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                    <p>Loading notifications...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-navy text-gray-400 p-4 text-center mt-auto">
        &copy; 2025 Virtuosa. All rights reserved.
    </footer>

    <script src="../js/cart.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/notification-modal.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>

</html>
