<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuosa - Log In or Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.441.0/dist/umd/lucide.min.js"></script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0A1128 0%, #060A18 100%);
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-gold {
            background-color: #FFD700;
        }

        .bg-light-gold {
            background-color: #E6C200;
        }

        .bg-dark-navy {
            background-color: #060A18;
        }

        .bg-button-gold {
            background-color: #C19A6B;
        }

        .form-container {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border: 1px solid #dcdcdc;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .auth-button {
            transition: all 0.3s ease-in-out;
            background: linear-gradient(90deg, #FFD700, #C19A6B);
        }

        .auth-button:hover {
            background: linear-gradient(90deg, #C19A6B, #FFD700);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .auth-input {
            border: 1px solid #d1d5db;
            transition: border-color 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }
    </style>
</head>

<body class="bg-navy antialiased flex flex-col min-h-screen items-center justify-center">
    <!-- Mobile Header for Auth Pages -->
    <header class="bg-navy text-white shadow-lg sticky top-0 z-50 w-full">
        <div class="v-container mobile-header-row-1">
            <div class="flex items-center justify-between py-3">
                <!-- Back to Home (Left) -->
                <a href="/index.html" class="v-touch text-white hover:text-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>

                <!-- Brand Name (Center) -->
                <div class="flex-1 text-center">
                    <a href="/index.html" class="text-2xl md:text-3xl font-bold text-gold mobile-logo">Virtuosa</a>
                </div>

                <!-- Cart Icon (Right) -->
                <div class="flex items-center space-x-3 mobile-header-actions">
                    <a href="/pages/cart.html" class="relative v-touch text-white hover:text-gold transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.185 1.706.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span class="cart-badge-count absolute -top-1 -right-1 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-red-100 transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 w-full">
        <div class="text-center mb-8">
            <a href="/" class="text-6xl font-bold text-gold">Virtuosa</a>
        </div>
        <div id="auth-container" class="flex flex-col items-center w-full"></div>
    </main>
    <footer class="bg-dark-navy text-gray-400 p-4 text-center shadow-inner mt-auto w-full">
        <div class="container mx-auto">
            &copy; 2025 Virtuosa. All rights reserved.
        </div>
    </footer>
    <script src="/js/mobile-header.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
