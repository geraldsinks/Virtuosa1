<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuosa - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-button-gold {
            background-color: #C19A6B;
        }

        .hover-bg-button-gold:hover {
            background-color: #A98B68;
        }

        .bg-dark-navy {
            background-color: #060A18;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="bg-gray-100 antialiased flex flex-col min-h-screen">
    <header class="bg-navy text-white shadow-lg py-3 px-6 md:px-12 sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center">
                <a href="/index.html" class="text-3xl font-bold text-gold">Virtuosa</a>
            </div>
            <div id="user-info-container" class="flex items-center space-x-4">
                <a href="/pages/login.html" id="login-link"
                    class="text-white hover:text-gold transition-colors font-medium hidden md:block">Log In</a>
                <span id="user-greeting" class="text-white font-medium"></span>
                <button id="logout-button"
                    class="bg-button-gold text-white font-semibold py-2 px-6 rounded-full shadow-lg hover-bg-button-gold transition-colors hidden">Log
                    Out</button>
                <a href="/pages/cart.html" class="relative text-white hover:text-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.185 1.706.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span
                        class="absolute -top-1 -right-1 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-red-100 transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>
            </div>
        </div>
    </header>
    <main class="flex-grow py-8">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-1">
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h3 class="text-lg font-bold text-navy mb-4">Menu</h3>
                        <nav class="space-y-3">
                            <a href="/pages/profile.html"
                                class="block px-4 py-2 text-navy hover:bg-gray-100 rounded-lg transition-colors">My
                                Profile</a>
                            <a href="/pages/orders.html"
                                class="block px-4 py-2 text-navy hover:bg-gray-100 rounded-lg transition-colors">My
                                Orders</a>
                            <a href="/pages/settings.html"
                                class="block px-4 py-2 bg-gold text-white rounded-lg font-semibold">Settings</a>
                            <a href="/index.html"
                                class="block px-4 py-2 text-navy hover:bg-gray-100 rounded-lg transition-colors">Back to
                                Shopping</a>
                        </nav>
                    </div>
                </div>
                <div class="md:col-span-3">
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h1 class="text-3xl font-bold text-navy mb-6">Settings</h1>
                        <form id="settings-form" class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold text-navy mb-2">Email Notifications</label>
                                <div class="flex items-center">
                                    <input type="checkbox" id="email-notifications" class="w-4 h-4" checked>
                                    <label for="email-notifications" class="ml-2 text-gray-600">Enable email
                                        notifications about orders and promotions</label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-navy mb-2">Privacy</label>
                                <div class="flex items-center">
                                    <input type="checkbox" id="privacy-profile" class="w-4 h-4" checked>
                                    <label for="privacy-profile" class="ml-2 text-gray-600">Make my profile visible to
                                        other sellers</label>
                                </div>
                            </div>
                            <div class="border-t border-gray-200 pt-6">
                                <h2 class="text-xl font-bold text-navy mb-4">Danger Zone</h2>
                                <button type="button" id="delete-account-btn"
                                    class="bg-red-600 text-white font-semibold py-2 px-6 rounded-full hover:bg-red-700 transition-colors">Delete
                                    Account</button>
                            </div>
                            <div class="flex gap-4">
                                <button type="submit"
                                    class="bg-button-gold text-white font-semibold py-2 px-6 rounded-full hover-bg-button-gold transition-colors">Save
                                    Settings</button>
                                <a href="/pages/profile.html"
                                    class="bg-gray-200 text-navy font-semibold py-2 px-6 rounded-full hover:bg-gray-300 transition-colors">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-navy text-gray-400 p-4 text-center shadow-inner mt-auto">
        &copy; 2025 Virtuosa. All rights reserved.
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginLink = document.getElementById('login-link');
            const userGreeting = document.getElementById('user-greeting');
            const logoutButton = document.getElementById('logout-button');
            const settingsForm = document.getElementById('settings-form');
            const deleteAccountBtn = document.getElementById('delete-account-btn');

            function updateUserUI() {
                const userFullName = localStorage.getItem('userFullName');
                if (userFullName) {
                    loginLink.classList.add('hidden');
                    userGreeting.textContent = `Hello, ${userFullName}`;
                    userGreeting.classList.remove('hidden');
                    logoutButton.classList.remove('hidden');
                } else {
                    loginLink.classList.remove('hidden');
                    userGreeting.classList.add('hidden');
                    logoutButton.classList.add('hidden');
                    window.location.href = '/pages/login.html';
                }
            }

            updateUserUI();

            settingsForm.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Settings saved successfully!');
            });

            deleteAccountBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                    alert('Account deletion feature coming soon!');
                }
            });

            logoutButton.addEventListener('click', async () => {
                try {
                    await fetch('/api/auth/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                    localStorage.removeItem('token');
                    localStorage.removeItem('userEmail');
                    localStorage.removeItem('userFullName');
                    window.location.href = '/index.html';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            });
        });
    </script>
    <script src="../js/header.js"></script>
    <script src="../js/cart.js"></script>
</body>

</html>
