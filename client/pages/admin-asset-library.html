<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Library - Admin Panel | Virtuosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CRITICAL: Global Navigation Bootstrap (enables SPA navigation on all pages) -->
    <script src="/js/navigation-bootstrap.js"></script>
    <script src="/js/navigation-coordinator.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-button-gold {
            background-color: #C19A6B;
        }

        .hover-bg-button-gold:hover {
            background-color: #A98B68;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .asset-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .asset-card:hover {
            transform: translateY(-4px);
            border-color: #FFD700;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .upload-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }

        .upload-zone.dragover {
            border-color: #FFD700;
            background-color: #fef3c7;
        }

        .tag-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .asset-preview {
            max-height: 200px;
            object-fit: cover;
            width: 100%;
        }

        .asset-actions {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .asset-card:hover .asset-actions {
            opacity: 1;
        }
    </style>

    <!-- Unified Header System -->
    <script src="/js/config.js"></script>
    <script src="/js/token-manager.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/cache-manager.js" defer></script>
    
    

    <!-- Clean URL System -->
    <script src="/js/navigation-state-manager.js"></script>
    <script src="/js/unified-header-fixed.js" defer></script>
    <script src="/js/url-helper.js" defer></script>
</head>

<body class="bg-gray-50 antialiased">
    

    <!-- Legacy mobile menu remnants removed -->

    <main class="flex-grow py-8">
        <div class="container mx-auto px-4">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-navy mb-2">Asset Library</h1>
                    <p class="text-gray-600">Manage marketing assets, banners, and promotional materials</p>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Search -->
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Search assets..." 
                               class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                    
                    <!-- Filter -->
                    <select id="filter-select" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold">
                        <option value="">All Assets</option>
                        <option value="image">Images</option>
                        <option value="video">Videos</option>
                        <option value="banner">Banners</option>
                        <option value="promotion">Promotions</option>
                    </select>
                    
                    <!-- Upload Button -->
                    <button id="upload-btn" class="bg-button-gold text-white px-4 py-2 rounded-lg hover-bg-button-gold transition-colors">
                        <i class="fas fa-upload mr-2"></i>Upload Asset
                    </button>
                </div>
            </div>

            <!-- Upload Zone (Hidden by default) -->
            <div id="upload-zone" class="upload-zone bg-white rounded-xl p-8 mb-8 hidden">
                <div class="text-center">
                    <i class="fas fa-cloud-upload-alt text-6xl text-gray-400 mb-4"></i>
                    <h3 class="text-xl font-semibold text-gray-700 mb-2">Upload Marketing Asset</h3>
                    <p class="text-gray-500 mb-4">Drag and drop files here or click to browse</p>
                    <input type="file" id="file-input" accept="image/*,video/*" multiple class="hidden">
                    <button id="browse-btn" class="bg-navy text-white px-6 py-2 rounded-lg hover:bg-gray-800 transition-colors">
                        Browse Files
                    </button>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tags (comma separated):</label>
                        <input type="text" id="tags-input" placeholder="banner, promotion, homepage" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gold">
                    </div>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Total Assets</p>
                            <p id="total-assets" class="text-2xl font-bold text-navy mt-1">0</p>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-lg">
                            <i class="fas fa-images text-blue-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-green-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Images</p>
                            <p id="total-images" class="text-2xl font-bold text-navy mt-1">0</p>
                        </div>
                        <div class="bg-green-50 p-3 rounded-lg">
                            <i class="fas fa-image text-green-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-purple-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Videos</p>
                            <p id="total-videos" class="text-2xl font-bold text-navy mt-1">0</p>
                        </div>
                        <div class="bg-purple-50 p-3 rounded-lg">
                            <i class="fas fa-video text-purple-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-orange-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Storage Used</p>
                            <p id="storage-used" class="text-2xl font-bold text-navy mt-1">0 MB</p>
                        </div>
                        <div class="bg-orange-50 p-3 rounded-lg">
                            <i class="fas fa-database text-orange-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Assets Grid -->
            <div id="assets-container" class="asset-grid">
                <!-- Assets will be loaded here -->
                <div class="text-center py-12 col-span-full">
                    <i class="fas fa-spinner fa-spin text-4xl text-gold mb-4"></i>
                    <p class="text-gray-600">Loading assets...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination-container" class="mt-8">
                <!-- Pagination will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-navy text-gray-400 p-4 text-center shadow-inner mt-auto">
        &copy; 2025 Virtuosa. All rights reserved.
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/admin-auth-helper.js"></script>
    <script src="../js/admin-asset-library.js"></script>
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>

</html>
