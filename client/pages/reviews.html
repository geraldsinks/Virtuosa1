<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Reviews - Virtuosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CRITICAL: Global Navigation Bootstrap (enables SPA navigation on all pages) -->
    <script src="/js/navigation-bootstrap.js"></script>
    <script src="/js/navigation-coordinator.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Unified Header System -->
    <script src="/js/config.js"></script>
    <script src="/js/token-manager.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/cache-manager.js" defer></script>
    
    
</head>
<style>
    body {
        font-family: 'Montserrat', sans-serif;
    }

    .bg-navy {
        background-color: #0A1128;
    }

    .text-gold {
        color: #FFD700;
    }

    .bg-button-gold {
        background-color: #C19A6B;
    }

    .hover-bg-button-gold:hover {
        background-color: #A98B68;
    }

    .bg-dark-navy {
        background-color: #060A18;
    }

    .hidden {
        display: none !important;
    }
</style>

    <!-- Clean URL System -->
    <script src="/js/navigation-state-manager.js"></script>
    <script src="/js/unified-header-fixed.js" defer></script>
    <script src="/js/url-helper.js" defer></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Standard Navigation -->
    
    <!-- Desktop Header from index.html -->

    

    <!-- Legacy mobile menu removed -->


    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Reviews & Ratings</h1>
            <p class="text-gray-600 mt-2">Manage your reviews and see what others are saying</p>
        </div>

        <!-- Tab Navigation -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="border-b border-gray-200">
                <nav class="flex space-x-8 px-6">
                    <button onclick="showTab('my-reviews')"
                        class="tab-button py-4 border-b-2 border-blue-500 text-blue-600 font-medium">
                        My Reviews
                    </button>
                    <button onclick="showTab('reviews-about-me')"
                        class="tab-button py-4 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium">
                        Reviews About Me
                    </button>
                    <button onclick="showTab('create-review')"
                        class="tab-button py-4 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium">
                        Write Review
                    </button>
                </nav>
            </div>
        </div>

        <!-- My Reviews Tab -->
        <div id="my-reviews" class="tab-content">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Reviews I've Written</h3>
                <div id="myReviewsList" class="space-y-4">
                    <!-- My reviews will be populated here -->
                </div>
            </div>
        </div>

        <!-- Reviews About Me Tab -->
        <div id="reviews-about-me" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Reviews About Me</h3>
                <div id="reviewsAboutMeList" class="space-y-4">
                    <!-- Reviews about me will be populated here -->
                </div>
            </div>
        </div>

        <!-- Create Review Tab -->
        <div id="create-review" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Write a Review</h3>
                <form id="createReviewForm" onsubmit="createReview(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Review Type</label>
                        <select id="reviewType" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="">Select review type</option>
                            <option value="Buyer to Seller">Review a Seller</option>
                            <option value="Seller to Buyer">Review a Buyer</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Transaction</label>
                        <select id="transactionSelect" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="">Select a completed transaction</option>
                            <!-- Transactions will be populated here -->
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Rating</label>
                        <div class="flex space-x-2">
                            <button type="button" onclick="setRating(1)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(2)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(3)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(4)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(5)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                        </div>
                        <input type="hidden" id="ratingValue" value="0" required>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Review</label>
                        <textarea id="reviewText" rows="4" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500"
                            placeholder="Share your experience..."></textarea>
                    </div>

                    <button type="submit"
                        class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
                        Submit Review
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Response Modal -->
    <div id="responseModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-lg bg-white">
            <div class="mt-3">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Respond to Review</h3>
                <div id="reviewToRespond" class="mb-4 p-3 bg-gray-50 rounded-lg">
                    <!-- Review details will be populated here -->
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Your Response</label>
                    <textarea id="responseText" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2"
                        required></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button onclick="closeResponseModal()"
                        class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400">
                        Cancel
                    </button>
                    <button onclick="submitResponse()"
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                        Submit Response
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/reviews.js"></script>

    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>

</html>
