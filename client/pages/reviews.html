<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Virtuosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<style>
    body {
        font-family: 'Montserrat', sans-serif;
    }

    .bg-navy {
        background-color: #0A1128;
    }

    .text-gold {
        color: #FFD700;
    }

    .bg-button-gold {
        background-color: #C19A6B;
    }

    .hover-bg-button-gold:hover {
        background-color: #A98B68;
    }

    .bg-dark-navy {
        background-color: #060A18;
    }

    .hidden {
        display: none !important;
    }
</style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Standard Navigation -->
    <header class="bg-navy text-white shadow-lg py-3 px-6 md:px-12 sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center">
                <a href="/index.html" class="text-3xl font-bold text-gold">Virtuosa</a>
            </div>
            
            <div id="user-info-container" class="flex items-center space-x-4 order-2 md:order-3">
                <a href="/pages/login.html" id="login-link"
                    class="text-white hover:text-gold transition-colors font-medium hidden md:block">Log In</a>
                <div id="user-menu" class="relative hidden">
                    <button onclick="window.toggleUserMenu()"
                        class="text-white hover:text-gold transition-colors font-medium flex items-center space-x-2">
                        <span id="user-greeting" class="hidden md:inline"></span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="user-dropdown"
                        class="absolute right-0 top-8 w-48 bg-navy rounded-lg shadow-xl z-50 py-2 hidden">
                        <a href="/pages/profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-user mr-2"></i>My Profile
                        </a>
                        <a href="/pages/transactions.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-exchange-alt mr-2"></i>My Transactions
                        </a>
                        <a href="/pages/reviews.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-star mr-2"></i>My Reviews
                        </a>
                        <div id="seller-links" class="hidden">
                            <a href="/pages/seller-dashboard.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-store mr-2"></i>Seller Panel
                            </a>
                            <a href="/pages/create-product.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-plus mr-2"></i>Create Listing
                            </a>
                        </div>
                        <div id="admin-link" class="hidden">
                            <a href="/pages/admin-dashboard.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-cog mr-2"></i>Admin Panel
                            </a>
                        </div>
                        <div class="border-t border-gray-700 my-1"></div>
                        <button onclick="window.logout()"
                            class="block w-full text-left px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-sign-out-alt mr-2"></i>Log Out
                        </button>
                    </div>
                </div>
                <button id="logout-button"
                    class="bg-button-gold text-white font-semibold py-2 px-6 rounded-full shadow-lg hover-bg-button-gold transition-colors hidden">Log
                    Out</button>
                <a href="/pages/cart.html" class="relative text-white hover:text-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.185 1.706.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span
                        class="absolute -top-1 -right-1 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-red-100 transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Reviews & Ratings</h1>
            <p class="text-gray-600 mt-2">Manage your reviews and see what others are saying</p>
        </div>

        <!-- Tab Navigation -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="border-b border-gray-200">
                <nav class="flex space-x-8 px-6">
                    <button onclick="showTab('my-reviews')"
                        class="tab-button py-4 border-b-2 border-blue-500 text-blue-600 font-medium">
                        My Reviews
                    </button>
                    <button onclick="showTab('reviews-about-me')"
                        class="tab-button py-4 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium">
                        Reviews About Me
                    </button>
                    <button onclick="showTab('create-review')"
                        class="tab-button py-4 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium">
                        Write Review
                    </button>
                </nav>
            </div>
        </div>

        <!-- My Reviews Tab -->
        <div id="my-reviews" class="tab-content">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Reviews I've Written</h3>
                <div id="myReviewsList" class="space-y-4">
                    <!-- My reviews will be populated here -->
                </div>
            </div>
        </div>

        <!-- Reviews About Me Tab -->
        <div id="reviews-about-me" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Reviews About Me</h3>
                <div id="reviewsAboutMeList" class="space-y-4">
                    <!-- Reviews about me will be populated here -->
                </div>
            </div>
        </div>

        <!-- Create Review Tab -->
        <div id="create-review" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Write a Review</h3>
                <form id="createReviewForm" onsubmit="createReview(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Review Type</label>
                        <select id="reviewType" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="">Select review type</option>
                            <option value="Buyer to Seller">Review a Seller</option>
                            <option value="Seller to Buyer">Review a Buyer</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Transaction</label>
                        <select id="transactionSelect" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="">Select a completed transaction</option>
                            <!-- Transactions will be populated here -->
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Rating</label>
                        <div class="flex space-x-2">
                            <button type="button" onclick="setRating(1)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(2)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(3)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(4)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                            <button type="button" onclick="setRating(5)"
                                class="rating-star text-2xl text-gray-300 hover:text-yellow-400">
                                <i class="fas fa-star"></i>
                            </button>
                        </div>
                        <input type="hidden" id="ratingValue" value="0" required>
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Review</label>
                        <textarea id="reviewText" rows="4" required
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500"
                            placeholder="Share your experience..."></textarea>
                    </div>

                    <button type="submit"
                        class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
                        Submit Review
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Response Modal -->
    <div id="responseModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-lg bg-white">
            <div class="mt-3">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">Respond to Review</h3>
                <div id="reviewToRespond" class="mb-4 p-3 bg-gray-50 rounded-lg">
                    <!-- Review details will be populated here -->
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Your Response</label>
                    <textarea id="responseText" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2"
                        required></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button onclick="closeResponseModal()"
                        class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400">
                        Cancel
                    </button>
                    <button onclick="submitResponse()"
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                        Submit Response
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/reviews.js"></script>
</body>

</html>
