<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Management - Virtuosa Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CRITICAL: Global Navigation Bootstrap (enables SPA navigation on all pages) -->
    <script src="/js/navigation-bootstrap.js"></script>
    <script src="/js/navigation-coordinator.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>

    <!-- Unified Header System -->
    <script src="/js/config.js"></script>
    <script src="/js/token-manager.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/cache-manager.js" defer></script>
    
    

    <!-- Clean URL System -->
    <script src="/js/navigation-state-manager.js"></script>
    <script src="/js/unified-header-fixed.js" defer></script>
    <script src="/js/url-helper.js" defer></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <!-- Standard Navigation -->
    

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Support Management</h1>
            <p class="text-gray-600 mt-2">Manage customer support tickets and inquiries</p>
        </div>

        <!-- Support Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Tickets</p>
                        <p id="totalTickets" class="text-2xl font-bold text-gray-900">-</p>
                        <p id="newTickets" class="text-sm text-blue-600">-</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fas fa-ticket-alt text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Open Tickets</p>
                        <p id="openTickets" class="text-2xl font-bold text-gray-900">-</p>
                        <p id="openPercentage" class="text-sm text-orange-600">-</p>
                    </div>
                    <div class="bg-orange-100 p-3 rounded-full">
                        <i class="fas fa-clock text-orange-600 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Resolved Today</p>
                        <p id="resolvedToday" class="text-2xl font-bold text-gray-900">-</p>
                        <p id="resolvedPercentage" class="text-sm text-green-600">-</p>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full">
                        <i class="fas fa-check-circle text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Avg Response Time</p>
                        <p id="avgResponseTime" class="text-2xl font-bold text-gray-900">-</p>
                        <p class="text-sm text-gray-500">minutes</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i class="fas fa-hourglass-half text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <div class="flex flex-wrap gap-4 items-center">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select id="statusFilter" class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="">All Status</option>
                        <option value="open">Open</option>
                        <option value="pending">Pending</option>
                        <option value="resolved">Resolved</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                    <select id="priorityFilter" class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="">All Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                    <select id="categoryFilter" class="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                        <option value="">All Categories</option>
                        <option value="account">Account Issues</option>
                        <option value="payment">Payment Problems</option>
                        <option value="transaction">Transaction Issues</option>
                        <option value="technical">Technical Support</option>
                        <option value="general">General Inquiry</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                    <input type="text" id="searchFilter" placeholder="Search tickets..." 
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-end">
                    <button onclick="loadSupportTickets()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                        <i class="fas fa-search mr-2"></i>Search
                    </button>
                </div>
            </div>
        </div>

        <!-- Support Tickets Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Support Tickets</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ticket ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Customer</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Subject</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Priority</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="supportTicketsList" class="bg-white divide-y divide-gray-200">
                        <!-- Tickets will be populated here -->
                    </tbody>
                </table>
            </div>
            <div id="ticketsPagination" class="px-6 py-4 border-t border-gray-200">
                <!-- Pagination will be populated here -->
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin-auth-helper.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 20;

        window.onPageReady(async () => {

            // Check admin access first
            const hasAccess = await checkAdminAccess();
            if (!hasAccess) {
                return;
            }
            
            await loadSupportStats();
            await loadSupportTickets();
        ;
        });

        async function loadSupportStats() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/admin/support/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const stats = await response.json();
                    document.getElementById('totalTickets').textContent = stats.totalTickets.toLocaleString();
                    document.getElementById('newTickets').textContent = `${stats.newTickets} new today`;
                    document.getElementById('openTickets').textContent = stats.openTickets.toLocaleString();
                    document.getElementById('openPercentage').textContent = `${stats.openPercentage}% of total`;
                    document.getElementById('resolvedToday').textContent = stats.resolvedToday.toLocaleString();
                    document.getElementById('resolvedPercentage').textContent = `${stats.resolvedPercentage}% resolved rate`;
                    document.getElementById('avgResponseTime').textContent = stats.avgResponseTime;
                }
            } catch (error) {
                console.error('Error loading support stats:', error);
            }
        }

        async function loadSupportTickets(page = 1) {
            try {
                const token = localStorage.getItem('token');
                const status = document.getElementById('statusFilter').value;
                const priority = document.getElementById('priorityFilter').value;
                const category = document.getElementById('categoryFilter').value;
                const search = document.getElementById('searchFilter').value;

                const params = new URLSearchParams({ page, limit: pageSize });
                if (status) params.append('status', status);
                if (priority) params.append('priority', priority);
                if (category) params.append('category', category);
                if (search) params.append('search', search);

                const response = await fetch(`${API_BASE}/admin/support/tickets?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    displaySupportTickets(data.tickets);
                    displayPagination(data.pagination);
                }
            } catch (error) {
                console.error('Error loading support tickets:', error);
            }
        }

        function displaySupportTickets(tickets) {
            const container = document.getElementById('supportTicketsList');
            container.innerHTML = '';

            if (tickets.length === 0) {
                container.innerHTML = '<tr><td colspan="8" class="px-6 py-4 text-center text-gray-500">No support tickets found</td></tr>';
                return;
            }

            tickets.forEach(ticket => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#${ticket.ticketId}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <div class="flex items-center">
                            <div class="bg-gray-200 h-8 w-8 rounded-full flex items-center justify-center mr-3">
                                <i class="fas fa-user text-gray-500 text-xs"></i>
                            </div>
                            <div>
                                <div class="text-sm font-medium text-gray-900">${ticket.customerName}</div>
                                <div class="text-xs text-gray-500">${ticket.customerEmail}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-900">${ticket.subject}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">
                            ${ticket.category}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getPriorityClass(ticket.priority)}">
                            ${ticket.priority}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusClass(ticket.status)}">
                            ${ticket.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${new Date(ticket.createdAt).toLocaleDateString()}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewTicket('${ticket._id}')" class="text-blue-600 hover:text-blue-900 mr-2">View</button>
                        <button onclick="assignTicket('${ticket._id}')" class="text-green-600 hover:text-green-900 mr-2">Assign</button>
                        <button onclick="resolveTicket('${ticket._id}')" class="text-purple-600 hover:text-purple-900">Resolve</button>
                    </td>
                `;
                container.appendChild(row);
            });
        }

        function getPriorityClass(priority) {
            const classes = {
                'low': 'bg-gray-100 text-gray-800',
                'medium': 'bg-blue-100 text-blue-800',
                'high': 'bg-orange-100 text-orange-800',
                'urgent': 'bg-red-100 text-red-800'
            };
            return classes[priority] || 'bg-gray-100 text-gray-800';
        }

        function getStatusClass(status) {
            const classes = {
                'open': 'bg-yellow-100 text-yellow-800',
                'pending': 'bg-blue-100 text-blue-800',
                'resolved': 'bg-green-100 text-green-800',
                'closed': 'bg-gray-100 text-gray-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        function displayPagination(pagination) {
            const container = document.getElementById('ticketsPagination');
            container.innerHTML = '';

            if (pagination.totalPages <= 1) return;

            let paginationHTML = '<div class="flex justify-center space-x-2">';
            
            for (let i = 1; i <= pagination.totalPages; i++) {
                const activeClass = i === pagination.currentPage ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 border border-gray-300';
                paginationHTML += `<button onclick="loadSupportTickets(${i})" class="px-3 py-1 rounded ${activeClass}">${i}</button>`;
            }
            
            paginationHTML += '</div>';
            container.innerHTML = paginationHTML;
        }

        function viewTicket(ticketId) {
            // Implementation for viewing ticket details
            console.log('View ticket:', ticketId);
        }

        function assignTicket(ticketId) {
            // Implementation for assigning ticket
            console.log('Assign ticket:', ticketId);
        }

        function resolveTicket(ticketId) {
            // Implementation for resolving ticket
            console.log('Resolve ticket:', ticketId);
        }
    </script>
    
    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>

</html>
