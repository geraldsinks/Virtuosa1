<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Shop - Virtuosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.441.0/dist/umd/lucide.min.js"></script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-gold {
            background-color: #FFD700;
        }
    </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Standard Navigation -->
    
    <!-- Mobile Header Structure (320px-480px) -->
    <header class="bg-navy text-white shadow-lg sticky top-0 z-50">
        <!-- Row 1: Utilities and Branding -->
        <div class="v-container mobile-header-row-1">
            <div class="flex items-center justify-between py-3">
                <!-- Hamburger Menu (Left) -->
                <button id="mobile-menu-toggle" class="v-touch text-white hover:text-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <!-- Brand Name (Center) -->
                <div class="flex-1 text-center">
                    <a href="/index.html" class="text-2xl md:text-3xl font-bold text-gold mobile-logo">Virtuosa</a>
                </div>

                <!-- Customer Utilities (Right) -->
                <div class="flex items-center space-x-3 mobile-header-actions">
                    <!-- Sign in / Profile Icon -->
                    <a href="/pages/login.html" id="mobile-login-link" class="v-touch text-white hover:text-gold transition-colors mobile-auth-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span class="mobile-auth-label hidden ml-1 text-sm">Sign in</span>
                    </a>
                    
                    <!-- Cart Icon with Badge -->
                    <a href="/pages/cart.html" class="relative v-touch text-white hover:text-gold transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.185 1.706.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <span class="cart-badge-count absolute -top-1 -right-1 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-red-100 transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Desktop Header (Hidden on Mobile) -->
        <div class="v-container v-header-row desktop-header">
            <div class="flex items-center v-header-logo">
                <a href="/index.html" class="text-xl md:text-3xl font-bold text-gold">Virtuosa</a>
            </div>

            <div id="user-info-container" class="flex items-center space-x-4 v-header-actions">
                <a href="/pages/login.html" id="login-link" class="text-white hover:text-gold transition-colors font-medium text-sm md:text-base hidden md:block">Log In</a>
                <div id="user-menu" class="relative hidden">
                    <button onclick="toggleUserMenu()" class="text-white hover:text-gold transition-colors font-medium flex items-center space-x-2">
                        <span id="user-greeting" class="hidden md:inline"></span>
                        <i class="fas fa-user-circle text-lg md:text-base"></i>
                        <i class="fas fa-chevron-down text-xs hidden md:inline"></i>
                    </button>
                    <div id="user-dropdown" class="absolute right-0 top-10 w-48 bg-navy rounded-lg shadow-xl z-50 py-2 hidden">
                        <a href="/pages/profile.html" class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors"><i class="fas fa-user mr-2"></i>My Profile</a>
                        <a href="/pages/dashboard.html" class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors"><i class="fas fa-tachometer-alt mr-2"></i>Dashboard</a>
                        <div class="border-t border-gray-700 my-1"></div>
                        <button onclick="logout()" class="block w-full text-left px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors"><i class="fas fa-sign-out-alt mr-2"></i>Log Out</button>
                    </div>
                </div>
                <a href="/pages/cart.html" class="relative text-white hover:text-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.185 1.706.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="cart-badge-count absolute -top-1 -right-1 inline-flex items-center justify-center px-1.5 py-0.5 text-[10px] font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Mobile Navigation Menu Overlay -->
    <div id="mobile-menu-overlay" class="mobile-menu-overlay">
        <div class="mobile-menu-content">
            <div class="mobile-menu-header">
                <div class="text-xl font-bold text-gold">Virtuosa Menu</div>
                <button id="mobile-menu-close" class="mobile-menu-close">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="mobile-menu-section">
                <a href="/index.html" class="mobile-menu-link"><i class="fas fa-home"></i><span>Home</span></a>
                <a href="/pages/products.html" class="mobile-menu-link"><i class="fas fa-shopping-bag"></i><span>Shop All</span></a>
                <a href="/pages/cart.html" class="mobile-menu-link"><i class="fas fa-shopping-cart"></i><span>My Cart</span></a>
            </div>
            <div class="mobile-menu-section">
                <div class="mobile-menu-title">Account</div>
                <a href="/pages/profile.html" class="mobile-menu-link"><i class="fas fa-user"></i><span>Profile</span></a>
                <a href="/pages/orders.html" class="mobile-menu-link"><i class="fas fa-box"></i><span>Orders</span></a>
            </div>
        </div>
    </div>



    <main class="container mx-auto px-4 py-12 flex-grow">
        <!-- Seller Info Header -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-12 border border-gray-100">
            <div class="h-32 bg-gradient-to-r from-navy to-gray-800"></div>
            <div class="px-8 pb-8 -mt-12">
                <div class="flex flex-col md:flex-row items-center md:items-end gap-6">
                    <div
                        class="w-24 h-24 rounded-full border-4 border-white bg-gold bg-opacity-20 flex items-center justify-center font-bold text-3xl text-gold shadow-lg">
                        <span id="seller-initial">?</span>
                    </div>
                    <div class="flex-grow text-center md:text-left">
                        <h1 id="seller-name" class="text-3xl font-bold text-navy">Loading Seller...</h1>
                        <div class="flex items-center justify-center md:justify-start gap-4 mt-2 text-gray-500">
                            <span id="seller-rating" class="flex items-center gap-1 font-bold text-gold">
                                <i data-lucide="star" class="w-4 h-4 fill-current"></i> 5.0
                            </span>
                            <span id="seller-products-count" class="text-sm">0 Items</span>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button id="message-seller-btn"
                            class="bg-navy text-gold px-6 py-3 rounded-xl font-bold hover:bg-opacity-90 transition-all flex items-center gap-2 shadow-lg">
                            <i data-lucide="message-square" class="w-5 h-5"></i> Message Seller
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <h2 class="text-2xl font-bold text-navy mb-8">All Listings</h2>
        <div id="seller-products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
            <p class="col-span-full py-20 text-center text-gray-400">Loading products...</p>
        </div>
    </main>

    <footer class="bg-navy text-gray-400 p-8 shadow-inner mt-auto">
        <div class="container mx-auto text-center">
            &copy; 2025 Virtuosa. All rights reserved.
        </div>
    </footer>

    <script src="../js/header.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sellerId = urlParams.get('sellerId');
            const shopSlug = urlParams.get('shop');
            const identifier = shopSlug || sellerId;

            if (!identifier) {
                window.location.href = '/pages/products.html';
                return;
            }

            try {
                const response = await fetch(`/api/seller/shop/${identifier}`);
                if (!response.ok) {
                    throw new Error('Shop not found');
                }
                const data = await response.json();
                const seller = data.seller;
                const products = data.products;

                // Update Header
                document.getElementById('seller-name').textContent = seller.storeName || seller.fullName;
                document.title = `${seller.storeName || seller.fullName} - Virtuosa Shop`;
                document.getElementById('seller-initial').textContent = (seller.storeName || seller.fullName).charAt(0);
                document.getElementById('seller-products-count').textContent = `${products.length} Items`;
                document.getElementById('seller-rating').innerHTML = `
                    <i data-lucide="star" class="w-4 h-4 fill-current"></i> ${seller.rating.toFixed(1)}
                    <span class="text-xs text-gray-400 font-normal ml-1">(${seller.totalReviews} reviews)</span>
                `;

                // Profile Picture fallback
                if (seller.profilePicture) {
                    const initialContainer = document.getElementById('seller-initial');
                    initialContainer.innerHTML = `<img src="${seller.profilePicture}" class="w-full h-full rounded-full object-cover">`;
                    initialContainer.classList.remove('bg-opacity-20');
                }

                // Add description if available
                if (seller.storeDescription) {
                    const headerInfo = document.getElementById('seller-name').parentElement;
                    const descContainer = document.createElement('p');
                    descContainer.className = 'text-gray-600 mt-2 max-w-2xl text-center md:text-left text-sm whitespace-pre-wrap';
                    descContainer.textContent = seller.storeDescription;
                    headerInfo.appendChild(descContainer);
                }

                document.getElementById('message-seller-btn').onclick = () => {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        window.location.href = '/pages/login.html';
                        return;
                    }
                    window.location.href = `/pages/messages.html?recipientId=${seller.id}`;
                };

                const container = document.getElementById('seller-products');
                if (products.length > 0) {
                    container.innerHTML = products.map(product => `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all hover:-translate-y-1 group cursor-pointer" onclick="window.location.href='/pages/product-detail.html?id=${product._id}'">
                            <div class="aspect-square overflow-hidden relative">
                                <img src="${product.images?.[0] || 'https://placehold.co/400x400?text=No+Image'}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute top-3 right-3 bg-white bg-opacity-90 backdrop-blur-sm px-2 py-1 rounded-lg text-[10px] font-bold text-navy shadow-sm">
                                    ${product.condition}
                                </div>
                            </div>
                            <div class="p-4">
                                <p class="text-[10px] text-gold font-bold uppercase mb-1 tracking-wider">${product.category}</p>
                                <h3 class="font-bold text-navy truncate mb-2 group-hover:text-gold transition-colors">${product.name}</h3>
                                <div class="flex items-center justify-between">
                                    <p class="text-navy font-bold">ZMW ${product.price.toLocaleString()}</p>
                                    <button class="bg-navy text-white p-2 rounded-lg hover:bg-gold hover:text-navy transition-all">
                                        <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <i data-lucide="package-search" class="w-16 h-16 text-gray-200 mx-auto mb-4"></i>
                            <p class="text-gray-400">This seller has no active listings at the moment.</p>
                        </div>
                    `;
                }

                if (window.lucide) window.lucide.createIcons();
            } catch (error) {
                console.error('Error fetching shop:', error);
                document.getElementById('seller-name').textContent = 'Shop Not Found';
                document.getElementById('seller-products').innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i data-lucide="alert-circle" class="w-16 h-16 text-red-200 mx-auto mb-4"></i>
                        <p class="text-gray-400">The requested shop could not be found or has been disabled.</p>
                        <a href="/pages/products.html" class="inline-block mt-4 text-gold font-bold hover:underline">Browse All Products</a>
                    </div>
                `;
                if (window.lucide) window.lucide.createIcons();
            }
        });
    </script>
<script src="/js/config.js"></script><script src="/js/header.js"></script><script src="/js/mobile-header.js"></script>
</body>

</html>
