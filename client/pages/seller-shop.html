        "https://www.facebook.com/share/16cWYpWWHb/?mibextid=wwXlfr",

      ],
      "description": "Zambia's premier student trading platform for campus marketplaces."
    }

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.441.0/dist/umd/lucide.min.js"></script>
    <style>

            font-family: 'Montserrat', sans-serif;

            background-color: #0A1128;
        }

            color: #FFD700;
        }

    <!-- Unified Header System -->
    <script src="/js/config.js"></script>
    <script src="/js/token-manager.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/cache-manager.js" defer></script>

    <script src="/js/url-helper.js" defer></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Standard Navigation -->
    
    <!-- Mobile Header Structure (320px-480px) -->

    <!-- Mobile Navigation Menu Overlay -->
    <main class="container mx-auto px-4 py-12 flex-grow">
        <!-- Seller Info Header -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-12 border border-gray-100">
            <div class="h-32 bg-gradient-to-r from-navy to-gray-800"></div>
            <div class="px-8 pb-8 -mt-12">
                <div class="flex flex-col md:flex-row items-center md:items-end gap-6">
                    <div
                        class="w-24 h-24 rounded-full border-4 border-white bg-gold bg-opacity-20 flex items-center justify-center font-bold text-3xl text-gold shadow-lg">
                        <span id="seller-initial">?</span>
                    </div>
                    <div class="flex-grow text-center md:text-left">
                        <h1 id="seller-name" class="text-3xl font-bold text-navy">Loading Seller...</h1>
                        <div class="flex items-center justify-center md:justify-start gap-4 mt-2 text-gray-500">
                            <span id="seller-rating" class="flex items-center gap-1 font-bold text-gold">
                                <i data-lucide="star" class="w-4 h-4 fill-current"></i> 5.0
                            </span>
                            <span id="seller-products-count" class="text-sm">0 Items</span>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button id="message-seller-btn"
                            class="bg-navy text-gold px-6 py-3 rounded-xl font-bold hover:bg-opacity-90 transition-all flex items-center gap-2 shadow-lg">
                            <i data-lucide="message-square" class="w-5 h-5"></i> Message Seller
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <h2 class="text-2xl font-bold text-navy mb-8">All Listings</h2>
        <div id="seller-products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
            <p class="col-span-full py-20 text-center text-gray-400">Loading products...</p>
        </div>

        <!-- Marketplace Exploration Ad -->
        <div class="bg-gradient-to-br from-white via-gray-50 to-gray-100 rounded-2xl shadow-xl p-8 mt-12 mb-8 border border-gray-200 relative overflow-hidden">
            <!-- Subtle background pattern -->
            <div class="absolute inset-0 opacity-5">
                <div class="absolute top-4 right-8 w-20 h-20 bg-gold rounded-full"></div>
                <div class="absolute bottom-6 left-12 w-16 h-16 bg-navy rounded-full"></div>
                <div class="absolute top-1/2 left-1/4 w-12 h-12 bg-gold rounded-full opacity-50"></div>
            </div>
            
            <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex-1 text-center md:text-left">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-gold rounded-xl mb-4 mx-auto md:mx-0">
                        <i data-lucide="shopping-cart" class="w-6 h-6 text-navy"></i>
                    </div>
                    <h3 class="text-2xl md:text-3xl font-bold text-navy mb-3">Explore More Products</h3>
                    <p class="text-gray-600 text-lg mb-6 leading-relaxed">Discover thousands of unique items from our diverse seller community across all categories</p>
                    <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                        <a href="/" class="bg-navy text-white px-8 py-4 rounded-xl font-semibold hover:bg-opacity-90 transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 flex items-center justify-center gap-3">
                            <i data-lucide="store" class="w-5 h-5"></i>
                            Visit Marketplace
                        </a>
                        <a href="/products" class="bg-white text-navy border-2 border-navy px-8 py-4 rounded-xl font-semibold hover:bg-navy hover:text-white transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 flex items-center justify-center gap-3">
                            <i data-lucide="grid-3x3" class="w-5 h-5"></i>
                            Browse Products
                        </a>
                    </div>
                </div>
                <div class="hidden lg:flex flex-col items-center space-y-4">
                    <div class="w-32 h-32 bg-gradient-to-br from-gold to-yellow-500 rounded-2xl flex items-center justify-center shadow-2xl">
                        <i data-lucide="sparkles" class="w-16 h-16 text-navy"></i>
                    </div>
                    <div class="text-center">
                        <div class="text-3xl font-bold text-navy">10K+</div>
                        <div class="text-sm text-gray-500 font-medium">Products Available</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-navy text-gray-400 p-8 shadow-inner mt-auto">
        <div class="container mx-auto text-center">
            &copy; 2026 Virtuosa. All rights reserved.
        </div>
    </footer>

    <script src="../js/cart.js"></script>
    <script>
        window.onPageReady(async () => {

            // Check for both query parameters and path parameters
            const urlParams = new URLSearchParams(window.location.search);
            const sellerId = urlParams.get('sellerId');
            const shopSlug = urlParams.get('shop'); // This will be set by router for clean URLs
            
            // Extract shop slug from clean URL path as fallback (e.g., /seller/my-shop)
            let pathShopSlug = null;
            if (!shopSlug) {
                const pathParts = window.location.pathname.split('/');
                const sellerIndex = pathParts.indexOf('seller');
                if (sellerIndex !== -1 && sellerIndex + 1 < pathParts.length) {
                    pathShopSlug = pathParts[sellerIndex + 1];
                }
            }
            
            const identifier = shopSlug || pathShopSlug || sellerId;

            if (!identifier) {
                window.location.href = '/products';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/seller/shop/${identifier}`);
                if (!response.ok) {
                    throw new Error('Shop not found');
                }
                const data = await response.json();
                const seller = data.seller;
                const products = data.products;

                // Update Header
                document.getElementById('seller-name').textContent = seller.storeName || seller.fullName;
                document.title = `${seller.storeName || seller.fullName} - Virtuosa Shop`;
                document.getElementById('seller-initial').textContent = (seller.storeName || seller.fullName).charAt(0);
                document.getElementById('seller-products-count').textContent = `${products.length} Items`;
                document.getElementById('seller-rating').innerHTML = `
                    <i data-lucide="star" class="w-4 h-4 fill-current"></i> ${seller.rating.toFixed(1)}
                    <span class="text-xs text-gray-400 font-normal ml-1">(${seller.totalReviews} reviews)</span>
                `;

                // Profile Picture fallback
                if (seller.profilePicture) {
                    const initialContainer = document.getElementById('seller-initial');
                    initialContainer.innerHTML = `<img src="${seller.profilePicture}" class="w-full h-full rounded-full object-cover">`;
                    initialContainer.classList.remove('bg-opacity-20');
                }

                // Add description if available
                if (seller.storeDescription) {
                    const headerInfo = document.getElementById('seller-name').parentElement;
                    const descContainer = document.createElement('p');
                    descContainer.className = 'text-gray-600 mt-2 max-w-2xl text-center md:text-left text-sm whitespace-pre-wrap';
                    descContainer.textContent = seller.storeDescription;
                    headerInfo.appendChild(descContainer);
                }

                document.getElementById('message-seller-btn').onclick = () => {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        window.navigateTo('/login');
                        return;
                    }
                    window.navigateTo(`/messages?recipientId=${seller.id}`);
                };

                const container = document.getElementById('seller-products');
                if (products.length > 0) {
                    container.innerHTML = products.map(product => `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all hover:-translate-y-1 group cursor-pointer" onclick="window.location.href='/product?id=${product._id}'">
                            <div class="aspect-square overflow-hidden relative">
                                <img src="${fixServerUrl(product.images?.[0]) || 'https://placehold.co/400x400?text=No+Image'}" 
                                     alt="${product.name} - ${product.category} on ${seller.storeName || seller.fullName}'s Virtuosa Shop" 
                                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                     width="300"
                                     height="300"
                                     loading="lazy">
                                <div class="absolute top-3 right-3 bg-white bg-opacity-90 backdrop-blur-sm px-2 py-1 rounded-lg text-[10px] font-bold text-navy shadow-sm">
                                    ${product.condition}
                                </div>
                            </div>
                            <div class="p-4">
                                <p class="text-[10px] text-gold font-bold uppercase mb-1 tracking-wider">${product.category}</p>
                                <h3 class="font-bold text-navy truncate mb-2 group-hover:text-gold transition-colors">${product.name}</h3>
                                <div class="flex items-center justify-between">
                                    <p class="text-navy font-bold">ZMW ${product.price.toLocaleString()}</p>
                                    <button class="bg-navy text-white p-2 rounded-lg hover:bg-gold hover:text-navy transition-all">
                                        <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <i data-lucide="package-search" class="w-16 h-16 text-gray-200 mx-auto mb-4"></i>
                            <p class="text-gray-400">This seller has no active listings at the moment.</p>
                        </div>
                    `;
                }

                if (window.lucide) window.lucide.createIcons();
            } catch (error) {
                console.error('Error fetching shop:', error);
                document.getElementById('seller-name').textContent = 'Shop Not Found';
                document.getElementById('seller-products').innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i data-lucide="alert-circle" class="w-16 h-16 text-red-200 mx-auto mb-4"></i>
                        <p class="text-gray-400">The requested shop could not be found or has been disabled.</p>
                        <a href="/products" class="inline-block mt-4 text-gold font-bold hover:underline">Browse All Products</a>
                    </div>
                `;
                if (window.lucide) window.lucide.createIcons();
            }
        });
    </script>
    <script src="../js/config.js"></script>
    <script>
        // Helper function to fix URLs to point to server
        function fixServerUrl(url) {
            if (!url) return url;
            return url.startsWith('/') ? `${API_BASE}${url}` : url;
        }
    </script>

    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>

</html>
