<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Virtuosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .bg-navy {
            background-color: #0A1128;
        }

        .text-gold {
            color: #FFD700;
        }

        .bg-button-gold {
            background-color: #C19A6B;
        }

        .hover-bg-button-gold:hover {
            background-color: #A98B68;
        }

        .bg-dark-navy {
            background-color: #060A18;
        }

        .hidden {
            display: none !important;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            border-left: 4px solid #3498db;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Standard Navigation -->
    <header class="bg-navy text-white shadow-lg py-3 px-6 md:px-12 sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center">
                <a href="/pages/index.html" class="text-3xl font-bold text-gold">Virtuosa</a>
            </div>
            <div class="flex-grow max-w-lg md:mx-auto order-3 md:order-2 w-full md:w-auto">
                <div class="relative">
                    <input type="text" placeholder="Search for books, notes, and more..."
                        class="w-full pl-4 pr-10 py-2 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-gold bg-gray-800 text-gray-200 placeholder-gray-400">
                    <button
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gold transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="user-info-container" class="flex items-center space-x-4 order-2 md:order-3">
                <a href="/pages/login.html" id="login-link"
                    class="text-white hover:text-gold transition-colors font-medium hidden md:block">Log In</a>
                <div id="user-menu" class="relative hidden">
                    <button onclick="window.toggleUserMenu()"
                        class="text-white hover:text-gold transition-colors font-medium flex items-center space-x-2">
                        <span id="user-greeting"></span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div id="user-dropdown"
                        class="absolute right-0 top-8 w-48 bg-navy rounded-lg shadow-xl z-50 py-2 hidden">
                        <a href="/pages/profile.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-user mr-2"></i>My Profile
                        </a>
                        <a href="/pages/dashboard.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-tachometer-alt mr-2"></i>Dashboard
                        </a>
                        <a href="/pages/transactions.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-exchange-alt mr-2"></i>My Transactions
                        </a>
                        <a href="/pages/reviews.html"
                            class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-star mr-2"></i>My Reviews
                        </a>
                        <div id="seller-links" class="hidden">
                            <a href="/pages/create-product.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-plus mr-2"></i>Create Listing
                            </a>
                        </div>
                        <div id="admin-link" class="hidden">
                            <a href="/pages/admin-dashboard.html"
                                class="block px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                                <i class="fas fa-cog mr-2"></i>Admin Panel
                            </a>
                        </div>
                        <div class="border-t border-gray-700 my-1"></div>
                        <button onclick="window.logout()"
                            class="block w-full text-left px-4 py-2 text-sm text-white hover:bg-gray-800 transition-colors">
                            <i class="fas fa-sign-out-alt mr-2"></i>Log Out
                        </button>
                    </div>
                </div>
                <button id="logout-button"
                    class="bg-button-gold text-white font-semibold py-2 px-6 rounded-full shadow-lg hover-bg-button-gold transition-colors hidden">Log
                    Out</button>
                <a href="/pages/cart.html" class="relative text-white hover:text-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.185 1.706.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span
                        class="absolute -top-1 -right-1 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-red-100 transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full">0</span>
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loadingState" class="hidden">
            <div class="flex items-center justify-center min-h-[400px]">
                <div class="text-center">
                    <div class="loading-spinner w-12 h-12"></div>
                    <p class="mt-4 text-gray-600">Loading your dashboard...</p>
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden">
            <div class="flex items-center justify-center min-h-[400px]">
                <div class="text-center">
                    <i class="fas fa-exclamation-triangle text-red-500 text-6xl mb-4"></i>
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Dashboard Error</h2>
                    <p class="text-gray-600 mb-4">Unable to load your dashboard. Please try again later.</p>
                    <button onclick="location.reload()"
                        class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition">
                        <i class="fas fa-redo mr-2"></i>Try Again
                    </button>
                </div>
            </div>
        </div>


    </div>

    <script src="../js/header.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
