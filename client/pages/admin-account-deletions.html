<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Deletion Management - Virtuosa Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>

    <!-- Unified Header System -->
    <script src="/js/config.js"></script>
    <script src="/js/token-manager.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/cache-manager.js" defer></script>
    <script src="/js/unified-header.js" defer></script>
    <script src="/js/production-router.js" defer></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <!-- Mobile Header Structure (320px-480px) -->

    <main class="flex-grow py-8">
        <div class="container mx-auto px-4">
            <!-- Header -->
            <div class="mb-8">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-navy mb-2">Account Deletion Requests</h1>
                        <p class="text-gray-600">Review and manage user account deletion requests</p>
                    </div>
                    <a href="admin-dashboard.html" class="text-navy hover:text-gold font-medium">
                        <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Pending Requests</p>
                            <p id="pendingCount" class="text-2xl font-bold text-orange-600">-</p>
                        </div>
                        <div class="bg-orange-100 p-3 rounded-full">
                            <i class="fas fa-clock text-orange-600 text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Approved Today</p>
                            <p id="approvedTodayCount" class="text-2xl font-bold text-green-600">-</p>
                        </div>
                        <div class="bg-green-100 p-3 rounded-full">
                            <i class="fas fa-check-circle text-green-600 text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Rejected Today</p>
                            <p id="rejectedTodayCount" class="text-2xl font-bold text-red-600">-</p>
                        </div>
                        <div class="bg-red-100 p-3 rounded-full">
                            <i class="fas fa-times-circle text-red-600 text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Requests</p>
                            <p id="totalCount" class="text-2xl font-bold text-navy">-</p>
                        </div>
                        <div class="bg-blue-100 p-3 rounded-full">
                            <i class="fas fa-list text-blue-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="flex flex-wrap items-center gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status Filter</label>
                        <select id="statusFilter" onchange="loadDeletionRequests()" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="all">All Requests</option>
                            <option value="Pending" selected>Pending</option>
                            <option value="Approved">Approved</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                        <input type="text" id="searchInput" placeholder="Search by name or email..." 
                               onkeyup="searchRequests()" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="flex items-end">
                        <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                            <i class="fas fa-sync-alt mr-2"></i>Refresh
                        </button>
                    </div>
                </div>
            </div>

            <!-- Requests Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reason</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Requests will be loaded here -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div id="pagination" class="px-6 py-4 bg-gray-50 border-t border-gray-200">
                    <!-- Pagination will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Request Details Modal -->
    <div id="requestModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4" 
         role="dialog" aria-modal="true" aria-labelledby="requestModalTitle">
        <div class="bg-white rounded-lg max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 id="requestModalTitle" class="text-xl font-bold text-navy">Deletion Request Details</h3>
                <button onclick="closeRequestModal()" class="text-gray-400 hover:text-gray-600" 
                        aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="requestDetails">
                <!-- Request details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Action Modal -->
    <div id="actionModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4" 
         role="dialog" aria-modal="true" aria-labelledby="actionModalTitle">
        <div class="bg-white rounded-lg max-w-md w-full p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 id="actionModalTitle" class="text-xl font-bold text-navy">Confirm Action</h3>
                <button onclick="closeActionModal()" class="text-gray-400 hover:text-gray-600" 
                        aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="mb-6">
                <p id="actionModalMessage" class="text-gray-700 mb-4"></p>
                
                <div class="mb-4">
                    <label for="adminNotes" class="block text-sm font-semibold text-gray-700 mb-2">Admin Notes</label>
                    <textarea id="adminNotes" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" 
                              placeholder="Add notes about this decision..." aria-describedby="adminNotesHelp"></textarea>
                    <p id="adminNotesHelp" class="text-xs text-gray-500 mt-1">Optional notes about this decision</p>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3">
                <button onclick="closeActionModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">
                    Cancel
                </button>
                <button id="confirmActionBtn" onclick="confirmAction()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/admin-auth-helper.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 20;
        let currentRequestId = null;
        let currentAction = null;
        let allRequests = [];

        document.addEventListener('DOMContentLoaded', async () => {
            // Check admin access first
            const hasAccess = await checkAdminAccess();
            if (!hasAccess) {
                return;
            }
            
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/pages/login.html';
                return;
            }

            await loadDeletionRequests();
        });

        async function loadDeletionRequests(page = 1) {
            try {
                const status = document.getElementById('statusFilter').value;
                const response = await fetch(`${API_BASE}/admin/account-deletion-requests?status=${status}&page=${page}&limit=${pageSize}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    allRequests = data.requests;
                    renderRequestsTable(data.requests);
                    renderPagination(data.pagination);
                    updateStats(data.requests);
                } else if (response.status === 401 || response.status === 403) {
                    // Authentication or authorization error - redirect to login
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/pages/login.html';
                    return;
                } else {
                    throw new Error('Failed to load deletion requests');
                }
            } catch (error) {
                console.error('Load requests error:', error);
                showToast('Failed to load deletion requests', 'error');
            }
        }

        function renderRequestsTable(requests) {
            const tbody = document.getElementById('requestsTableBody');
            
            if (requests.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-2"></i>
                            <p>No deletion requests found</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = requests.map(request => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <img class="h-10 w-10 rounded-full" src="${escapeHtml(request.user.profilePicture || 'https://placehold.co/40x40?text=No+Photo')}" alt="">
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${escapeHtml(request.user.fullName || 'Unknown')}</div>
                                <div class="text-sm text-gray-500">${escapeHtml(request.user.email || 'No email')}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-900 max-w-xs truncate" title="${escapeHtml(request.reason || 'No reason provided')}">
                            ${escapeHtml(request.reason || 'No reason provided')}
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                            ${request.status === 'Pending' ? 'bg-orange-100 text-orange-800' : ''}
                            ${request.status === 'Approved' ? 'bg-green-100 text-green-800' : ''}
                            ${request.status === 'Rejected' ? 'bg-red-100 text-red-800' : ''}">
                            ${escapeHtml(request.status)}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${request.createdAt ? new Date(request.createdAt).toLocaleDateString() : 'N/A'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewRequest('${escapeHtml(request._id)}')" class="text-blue-600 hover:text-blue-900 mr-3">
                            <i class="fas fa-eye"></i> View
                        </button>
                        ${request.status === 'Pending' ? `
                            <button onclick="showActionModal('${escapeHtml(request._id)}', 'approve')" class="text-green-600 hover:text-green-900 mr-3">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button onclick="showActionModal('${escapeHtml(request._id)}', 'reject')" class="text-red-600 hover:text-red-900">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            
            if (pagination.pages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '<div class="flex items-center justify-between">';
            html += '<div class="text-sm text-gray-700">';
            html += `Showing ${((pagination.current - 1) * pageSize) + 1} to ${Math.min(pagination.current * pageSize, pagination.total)} of ${pagination.total} results`;
            html += '</div>';
            
            html += '<div class="flex items-center space-x-2">';
            
            // Previous button
            if (pagination.current > 1) {
                html += `<button onclick="loadDeletionRequests(${pagination.current - 1})" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-50">Previous</button>`;
            }
            
            // Page numbers
            for (let i = 1; i <= pagination.pages; i++) {
                if (i === pagination.current) {
                    html += `<button class="px-3 py-1 bg-blue-600 text-white rounded-md">${i}</button>`;
                } else if (Math.abs(i - pagination.current) <= 2) {
                    html += `<button onclick="loadDeletionRequests(${i})" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-50">${i}</button>`;
                }
            }
            
            // Next button
            if (pagination.current < pagination.pages) {
                html += `<button onclick="loadDeletionRequests(${pagination.current + 1})" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-50">Next</button>`;
            }
            
            html += '</div></div>';
            container.innerHTML = html;
        }

        function updateStats(requests) {
            const pending = requests.filter(r => r.status === 'Pending').length;
            const today = new Date().toDateString();
            const approvedToday = requests.filter(r => 
                r.status === 'Approved' && 
                r.processedAt && 
                new Date(r.processedAt).toDateString() === today
            ).length;
            const rejectedToday = requests.filter(r => 
                r.status === 'Rejected' && 
                r.processedAt && 
                new Date(r.processedAt).toDateString() === today
            ).length;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedTodayCount').textContent = approvedToday;
            document.getElementById('rejectedTodayCount').textContent = rejectedToday;
            document.getElementById('totalCount').textContent = requests.length;
        }

        async function viewRequest(requestId) {
            try {
                const response = await fetch(`${API_BASE}/admin/account-deletion-requests/${requestId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });

                if (response.ok) {
                    const request = await response.json();
                    showRequestDetails(request);
                } else if (response.status === 401 || response.status === 403) {
                    // Authentication or authorization error - redirect to login
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/pages/login.html';
                    return;
                } else {
                    throw new Error('Failed to load request details');
                }
            } catch (error) {
                console.error('View request error:', error);
                showToast('Failed to load request details', 'error');
            }
        }

        function showRequestDetails(request) {
            const detailsDiv = document.getElementById('requestDetails');
            detailsDiv.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h4 class="font-semibold text-gray-900 mb-2">User Information</h4>
                        <div class="bg-gray-50 rounded-lg p-4">
                            <div class="flex items-center mb-4">
                                <img class="h-16 w-16 rounded-full" src="${escapeHtml(request.user?.profilePicture || 'https://placehold.co/64x64?text=No+Photo')}" alt="">
                                <div class="ml-4">
                                    <div class="text-lg font-medium text-gray-900">${escapeHtml(request.user?.fullName || 'Unknown')}</div>
                                    <div class="text-sm text-gray-500">${escapeHtml(request.user?.email || 'No email')}</div>
                                    <div class="text-sm text-gray-500">${escapeHtml(request.user?.phoneNumber || 'No phone')}</div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="font-medium">University:</span> ${escapeHtml(request.user?.university || 'N/A')}
                                </div>
                                <div>
                                    <span class="font-medium">Member Since:</span> ${request.user?.createdAt ? new Date(request.user.createdAt).toLocaleDateString() : 'N/A'}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="font-semibold text-gray-900 mb-2">Deletion Reason</h4>
                        <div class="bg-gray-50 rounded-lg p-4">
                            <p class="text-gray-700">${escapeHtml(request.reason || 'No reason provided')}</p>
                        </div>
                    </div>

                    <div>
                        <h4 class="font-semibold text-gray-900 mb-2">Request Status</h4>
                        <div class="bg-gray-50 rounded-lg p-4">
                            <div class="flex items-center mb-2">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                                    ${request.status === 'Pending' ? 'bg-orange-100 text-orange-800' : ''}
                                    ${request.status === 'Approved' ? 'bg-green-100 text-green-800' : ''}
                                    ${request.status === 'Rejected' ? 'bg-red-100 text-red-800' : ''}">
                                    ${escapeHtml(request.status)}
                                </span>
                            </div>
                            <div class="text-sm text-gray-600">
                                <p>Submitted: ${request.createdAt ? new Date(request.createdAt).toLocaleDateString() + ' ' + new Date(request.createdAt).toLocaleTimeString() : 'N/A'}</p>
                                ${request.processedAt ? `
                                    <p>Processed: ${new Date(request.processedAt).toLocaleDateString()} ${new Date(request.processedAt).toLocaleTimeString()}</p>
                                    <p>Processed by: ${escapeHtml(request.processedBy?.fullName || 'Unknown')}</p>
                                ` : ''}
                            </div>
                        </div>
                    </div>

                    ${request.adminNotes ? `
                        <div>
                            <h4 class="font-semibold text-gray-900 mb-2">Admin Notes</h4>
                            <div class="bg-gray-50 rounded-lg p-4">
                                <p class="text-gray-700">${escapeHtml(request.adminNotes)}</p>
                            </div>
                        </div>
                    ` : ''}

                    ${request.status === 'Pending' ? `
                        <div class="flex justify-end space-x-3 pt-4 border-t">
                            <button onclick="showActionModal('${escapeHtml(request._id)}', 'reject')" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                                <i class="fas fa-times mr-2"></i>Reject Request
                            </button>
                            <button onclick="showActionModal('${escapeHtml(request._id)}', 'approve')" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                                <i class="fas fa-check mr-2"></i>Approve Deletion
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;

            const modal = document.getElementById('requestModal');
            modal.classList.remove('hidden');
            
            // Focus management for accessibility
            const focusableElements = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (focusableElements.length > 0) {
                focusableElements[0].focus();
            }
        }

        function showActionModal(requestId, action) {
            currentRequestId = requestId;
            currentAction = action;
            
            const title = document.getElementById('actionModalTitle');
            const message = document.getElementById('actionModalMessage');
            const confirmBtn = document.getElementById('confirmActionBtn');
            
            if (action === 'approve') {
                title.textContent = 'Approve Account Deletion';
                message.textContent = 'Are you sure you want to approve this account deletion request? This action cannot be undone and will permanently delete the user\'s account and all associated data.';
                confirmBtn.className = 'px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium';
                confirmBtn.innerHTML = '<i class="fas fa-check mr-2"></i>Approve Deletion';
            } else {
                title.textContent = 'Reject Account Deletion';
                message.textContent = 'Are you sure you want to reject this account deletion request? The user will be notified and can submit a new request if needed.';
                confirmBtn.className = 'px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium';
                confirmBtn.innerHTML = '<i class="fas fa-times mr-2"></i>Reject Request';
            }
            
            document.getElementById('adminNotes').value = '';
            const modal = document.getElementById('actionModal');
            modal.classList.remove('hidden');
            
            // Focus management for accessibility
            setTimeout(() => {
                const adminNotesInput = document.getElementById('adminNotes');
                adminNotesInput.focus();
            }, 100);
        }

        async function confirmAction() {
            try {
                const adminNotes = document.getElementById('adminNotes').value;
                const endpoint = currentAction === 'approve' ? 'approve' : 'reject';
                
                const response = await fetch(`${API_BASE}/admin/account-deletion-requests/${currentRequestId}/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ adminNotes })
                });

                if (response.ok) {
                    showToast(`Request ${currentAction}d successfully`, 'success');
                    closeActionModal();
                    closeRequestModal();
                    await loadDeletionRequests(currentPage);
                } else if (response.status === 401 || response.status === 403) {
                    // Authentication or authorization error - redirect to login
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/pages/login.html';
                    return;
                } else {
                    const error = await response.json();
                    throw new Error(error.message || `Failed to ${currentAction} request`);
                }
            } catch (error) {
                console.error('Confirm action error:', error);
                showToast(error.message || `Failed to ${currentAction} request`, 'error');
            }
        }

        function closeRequestModal() {
            document.getElementById('requestModal').classList.add('hidden');
        }

        function closeActionModal() {
            document.getElementById('actionModal').classList.add('hidden');
            currentRequestId = null;
            currentAction = null;
        }

        function searchRequests() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredRequests = allRequests.filter(request => 
                (request.user?.fullName && request.user.fullName.toLowerCase().includes(searchTerm)) ||
                (request.user?.email && request.user.email.toLowerCase().includes(searchTerm))
            );
            renderRequestsTable(filteredRequests);
        }

        // HTML escaping function to prevent XSS
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function refreshData() {
            loadDeletionRequests(currentPage);
        }

        // Toast notification function
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed top-4 right-4 z-50 space-y-2';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `max-w-sm w-full bg-white shadow-lg rounded-lg pointer-events-auto ring-1 ring-black ring-opacity-5 p-4 ${
                type === 'success' ? 'border-l-4 border-green-500' :
                type === 'error' ? 'border-l-4 border-red-500' :
                'border-l-4 border-blue-500'
            }`;

            toast.innerHTML = `
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas ${
                            type === 'success' ? 'fa-check-circle text-green-500' :
                            type === 'error' ? 'fa-exclamation-circle text-red-500' :
                            'fa-info-circle text-blue-500'
                        }"></i>
                    </div>
                    <div class="ml-3 w-0 flex-1">
                        <p class="text-sm font-medium text-gray-900">${message}</p>
                    </div>
                    <div class="ml-4 flex-shrink-0 flex">
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" class="inline-flex text-gray-400 hover:text-gray-500">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            `;

            container.appendChild(toast);

            // Auto remove after 5 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.remove();
                }
            }, 5000);
        }
    </script>
    
    <script src="../js/cart.js"></script>

    <!-- Cookie Analytics & Consent -->
    <script src="/js/cookie-consent.js"></script>
    <script src="/js/cookie-tracker.js"></script>
</body>
