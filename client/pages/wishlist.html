<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Virtuosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/navigation-bootstrap.js"></script>
    <script src="/js/navigation-coordinator.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="/js/image-optimizer.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .bg-navy { background-color: #0A1128; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                <div>
                    <h1 class="text-3xl font-bold text-navy mb-2">My Wishlist</h1>
                    <p class="text-gray-500">Items you've saved for later</p>
                </div>
                <div class="flex items-center gap-3">
                    <span id="wishlist-count-badge" class="bg-navy text-white px-3 py-1 rounded-full text-sm font-bold">0 Items</span>
                    <a href="/products" class="text-sm font-bold text-navy hover:text-gold transition-colors flex items-center gap-2">
                        <i class="fas fa-shopping-bag"></i> Continue Shopping
                    </a>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-gold mb-4"></div>
                <p class="text-gray-500 font-medium">Loading your favorites...</p>
            </div>

            <!-- Empty State -->
            <div id="empty-wishlist" class="hidden flex flex-col items-center justify-center py-20 text-center">
                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center text-gray-300 mb-6">
                    <i class="fas fa-heart text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-navy mb-3">Your wishlist is empty</h2>
                <p class="text-gray-500 max-w-sm mb-8">Save items you like to see them here later and track price changes.</p>
                <a href="/products" class="bg-navy text-white px-10 py-4 rounded-full font-bold hover:bg-gray-800 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                    Explore Products
                </a>
            </div>

            <!-- Wishlist Grid -->
            <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Items will be injected here -->
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/config.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script src="/js/wishlist-manager.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/wishlist.js"></script>
</body>
</html>
