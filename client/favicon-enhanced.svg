<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle with gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0A1128"/>
    </radialGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#C19A6B"/>
    </linearGradient>
  </defs>
  
  <circle cx="16" cy="16" r="16" fill="url(#bgGradient)"/>
  
  <!-- V letter with gold gradient -->
  <path d="M8 8 L16 24 L24 8" stroke="url(#goldGradient)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Marketplace connection dots -->
  <circle cx="10" cy="12" r="2" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="22" cy="12" r="2" fill="url(#goldGradient)" opacity="0.8"/>
  <circle cx="16" cy="20" r="2" fill="url(#goldGradient)" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="10" y1="12" x2="16" y2="20" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <line x1="22" y1="12" x2="16" y2="20" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
</svg>
